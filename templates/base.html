<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống Dự báo Churn Khách hàng Ngân hàng — ML Research Platform với Random Forest, XGBoost, K-Means và SHAP Explainability." />
  <title>Bank Churn Analytics — Hệ thống Dự báo Khách hàng Rời bỏ</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/static/style.css?v=20260413" />
</head>
<body>
  <div class="dashboard-container">

    <!-- ══════ SIDEBAR ══════ -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">🏦</div>
          <div>
            <div class="sidebar-logo-text">Bank Churn Analytics</div>
            <div class="sidebar-logo-sub">Nền tảng Phân tích Dữ liệu</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Tổng quan</div>
        <button class="nav-btn active" data-tab="overview">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard Tổng quan</span>
        </button>
        <button class="nav-btn" data-tab="dictionary">
          <span class="nav-icon">📚</span>
          <span class="nav-text">Từ điển Dữ liệu (Schema)</span>
        </button>

        <div class="nav-section-label">Phân tích Dữ liệu</div>
        <button class="nav-btn" data-tab="eda">
          <span class="nav-icon">🔍</span>
          <span class="nav-text">Khám phá Dữ liệu (EDA)</span>
        </button>
        <button class="nav-btn" data-tab="imbalanced">
          <span class="nav-icon">⚖️</span>
          <span class="nav-text">Xử lý Mất cân bằng</span>
        </button>

        <div class="nav-section-label">Mô hình ML</div>
        <button class="nav-btn" data-tab="models">
          <span class="nav-icon">🤖</span>
          <span class="nav-text">Đánh giá Thuật toán</span>
        </button>
        <button class="nav-btn" data-tab="shap">
          <span class="nav-icon">🧠</span>
          <span class="nav-text">Giải thích AI (SHAP)</span>
        </button>

        <div class="nav-section-label">Phân đoạn &amp; Dự báo</div>
        <button class="nav-btn" data-tab="clusters">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Phân cụm K-Means</span>
        </button>
        <button class="nav-btn" data-tab="predict">
          <span class="nav-icon">🎯</span>
          <span class="nav-text">Công cụ Dự báo</span>
          <span class="nav-badge">Trực tuyến</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span>Churn Predict</span>
        <span class="sidebar-version">v2.0</span>
      </div>
    </aside>

    <!-- ══════ MAIN ══════ -->
    <main class="main-content">
      <div class="top-bar">
        <div class="top-bar-left">
          <nav class="breadcrumb" aria-label="breadcrumb">
            <a href="#">Bank Analytics</a>
            <span class="breadcrumb-sep">/</span>
          </nav>
          <h1 class="page-title" id="page-title-bar">Dashboard Tổng quan</h1>
        </div>
        <div class="top-bar-right">
          <div class="top-bar-badge">
            <span class="live-dot"></span>
            Hệ thống ổn định
          </div>
        </div>
      </div>

      <div class="content-wrapper">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script src="/static/app.js?v=20260415_v29"></script>
</body>
</html>
